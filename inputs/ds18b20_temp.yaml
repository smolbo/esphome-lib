defaults:
  one_wire_bus: onewire_23
  update_interval_ds_temp: 2sec
  id_prefix: ""
  i: ""
#  address_hex:
  on_value_script: "default_on_value_script"

sensor:
  - platform: dallas_temp
    one_wire_id: ${one_wire_bus}
    id: ${id_prefix}${i}
    name: ${id_prefix}${i}
    address: 0x${address_hex}
    device_class: temperature
    state_class: measurement
    update_interval: ${update_interval_ds_temp}
    on_value:
      then:
        - delay: 100ms
        - script.execute: "${on_value_script}"

    filters:
      - filter_out: NaN
      - quantile:
          send_every: 1
          window_size: 5
      - throttle_average: 10s

text_sensor:
  - platform: template
    id: ${id_prefix}${i}_addr
    name: ${id_prefix}${i}_addr
    lambda: return {"${address_hex}"};