defaults:
  i2c_bus_addr_hex: "48"
  i2c_bus_id: "i2c_bus_0"
  adc_id: "ads1115_${i2c_bus_addr_hex}"


packages:
  channel0: !include {file: ads1115_channel.yaml, vars: {bus_addr: "${i2c_bus_addr_hex}", adc_id: "${adc_id}", channel: "0"}}
  channel1: !include {file: ads1115_channel.yaml, vars: {bus_addr: "${i2c_bus_addr_hex}", adc_id: "${adc_id}", channel: "1"}}
  channel2: !include {file: ads1115_channel.yaml, vars: {bus_addr: "${i2c_bus_addr_hex}", adc_id: "${adc_id}", channel: "2"}}
  channel3: !include {file: ads1115_channel.yaml, vars: {bus_addr: "${i2c_bus_addr_hex}", adc_id: "${adc_id}", channel: "3"}}


ads1115:
  - address: 0x${i2c_bus_addr_hex}
    id: ${adc_id}
    i2c_id: ${i2c_bus_id}
